name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"

      - name: Create Flutter project
        run: flutter create temp_app

      - name: Copy your code
        run: |
          rm -rf temp_app/lib
          cp -r lib temp_app/
          cp pubspec.yaml temp_app/

      - name: Build APK
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: study-with-ts-apk
          path: temp_app/build/app/outputs/flutter-apk/app-debug.apk
